<!DOCTYPE html>
<html>
<head>
    <title>User Register</title>

    <link rel="stylesheet"
    href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<div class="background"></div>

<div class="container">

    <h1>⚡ USER REGISTER ⚡</h1>

    <form method="POST">

        <input type="text"
        name="full_name"
        placeholder="Full Name"
        required>

        <input type="email"
        name="email"
        placeholder="Email"
        required>

        <input type="text"
        name="phone"
        placeholder="Phone Number"
        required>

        <input type="text"
        name="address"
        placeholder="Address"
        required>

        <input type="password"
        name="password"
        placeholder="Password"
        required>

        <button type="submit">
            Register
        </button>

    </form>

    <br>

    <a href="/">
        <button>
            Back Home
        </button>
    </a>

</div>

</body>
</html>
