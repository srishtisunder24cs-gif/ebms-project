<!DOCTYPE html>
<html>
<head>
    <title>Forgot Password</title>

    <link rel="stylesheet"
    href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<div class="background"></div>

<div class="container">

    <h1>⚡ RESET PASSWORD ⚡</h1>

    <form method="POST">

        <input type="email"
        name="email"
        placeholder="Enter Email"
        required>

        <input type="password"
        name="new_password"
        placeholder="New Password"
        required>

        <button type="submit">
            Reset Password
        </button>

    </form>

    <br>

    <a href="/">
        <button>
            Back Home
        </button>
    </a>

</div>

</body>
</html>
